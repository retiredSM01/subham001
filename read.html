<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goon Time Calculator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff6ec4, #7873f5, #42e695);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 20px;
    width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

h1 {
    color: #ff4081;
}

input, select, button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

input, select {
    background: #f3f3f3;
}

button {
    background: linear-gradient(45deg, #ff4081, #7c4dff);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    opacity: 0.9;
}

#result {
    margin-top: 15px;
    padding: 12px;
    border-radius: 10px;
    font-weight: bold;
    background: #e0ffe0;
}
</style>
</head>

<body>

<div class="container">
    <h1>Goon Time Calculator</h1>

    <input type="text" id="name" placeholder="Name">
    <input type="number" id="age" placeholder="Age">
    
    <select id="gender">
        <option value="">Gender</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
    </select>

    <input type="email" id="email" placeholder="Email">

    <button onclick="calculate()">Calculate Goon Time</button>

    <div id="result"></div>
</div>

<script>
async function calculate() {
    const name = document.getElementById('name').value;
    const age = document.getElementById('age').value;
    const gender = document.getElementById('gender').value;
    const email = document.getElementById('email').value;

    if (!name || !age || !gender || !email) {
        document.getElementById('result').innerHTML = "Fill all fields!";
        return;
    }

    // Send data to backend
    try {
        await fetch('http://localhost:3000/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, age, gender, email })
        });
    } catch (err) {
        console.log("Server not connected yet");
    }

    // Generate result
    const time = Math.floor(Math.random() * 100) + 10;

    document.getElementById('result').innerHTML =
        `${name}, your goon time is ${time} minutes 😎`;
}
</script>

</body>
</html>
