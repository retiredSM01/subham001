<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gooning Time Calculator</title>
    <style>
        /* Body with gradient background */
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* Main container with enhanced style */
        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            background-color: #fff7e6; /* Light yellow background */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #ff4081; /* Pink for title */
            font-size: 3em;
            margin-bottom: 10px;
            animation: fadeIn 1s ease-out;
        }

        /* Input and button fields */
        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            transition: all 0.3s ease;
        }

        input {
            background-color: #ffebee;
            border: 2px solid #ff4081;
        }

        select {
            background-color: #ffebee;
            border: 2px solid #ff4081;
        }

        button {
            background-color: #ff4081;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: 0.3s ease;
        }

        button:hover {
            background-color: #ff3366;
        }

        /* Result box with animations */
        #result {
            font-size: 1.5em;
            margin-top: 20px;
            font-weight: bold;
            color: #333;
            background-color: #d1f7c4;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s ease;
        }

        /* Error styling */
        #result.error {
            background-color: #ffcccb;
        }

        /* Success styling */
        #result.success {
            background-color: #c8e6c9;
        }

        /* Simple fade-in animation for header */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Mobile responsiveness */
        @media (max-width: 500px) {
            h1 {
                font-size: 2.5em;
            }
            input, select, button {
                font-size: 1em;
            }
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>Gooning Time Calculator</h1>
        <p>Enter your details to calculate your personalized gooning time!</p>

        <!-- Input fields for more personal data -->
        <input type="text" id="name" placeholder="Enter your name">
        <input type="number" id="age" placeholder="Enter your age" min="1">
        <select id="gender">
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select>
        <input type="email" id="email" placeholder="Enter your email">
        
        <button onclick="calculateGooningTime()">Calculate Gooning Time</button>

        <h2 id="result"></h2>
    </div>

    <script>
        function calculateGooningTime() {
            // Collecting input values
            var name = document.getElementById('name').value;
            var age = document.getElementById('age').value;
            var gender = document.getElementById('gender').value;
            var email = document.getElementById('email').value;

            // Validation for empty fields
            if (name === '' || age === '' || age <= 0 || gender === '' || email === '') {
                document.getElementById('result').innerHTML = 'Please fill out all the fields!';
                document.getElementById('result').classList.add('error');
                document.getElementById('result').classList.remove('success');
                return;
            }

            // Random gooning time logic
            var minTime = 10; // Min time: 10 minutes
            var maxTime = 120; // Max time: 120 minutes
            var randomTime = Math.floor(Math.random() * (maxTime - minTime + 1)) + minTime;

            // Personalizing the message based on input
            document.getElementById('result').innerHTML = `${name}, your gooning time is: ${randomTime} minutes`;
            
            if (gender === 'male') {
                document.getElementById('result').innerHTML += `<br>Enjoy your time, bro!`;
            } else if (gender === 'female') {
                document.getElementById('result').innerHTML += `<br>Enjoy your time, girl!`;
            } else {
                document.getElementById('result').innerHTML += `<br>Enjoy your time, friend!`;
            }

            // Success message and style
            document.getElementById('result').classList.add('success');
            document.getElementById('result').classList.remove('error');
        }
    </script>

</body>
</html>
