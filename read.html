
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goon Time Calculator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1f1c2c, #928dab);
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* Glassmorphism card */
.container {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 20px;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    text-align: center;
}

h1 {
    margin-bottom: 10px;
}

/* Inputs */
input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
    outline: none;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg, #ff4b2b, #ff416c);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* Result */
#result {
    margin-top: 15px;
    padding: 12px;
    border-radius: 10px;
    background: rgba(0,255,150,0.2);
    display: none;
}

/* Loading bar */
#loading {
    width: 100%;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    margin-top: 15px;
    display: none;
}

#bar {
    width: 0%;
    height: 10px;
    background: #00ffcc;
    border-radius: 10px;
}

/* Footer note */
.note {
    margin-top: 15px;
    font-size: 12px;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">
    <h1>Goon Time Calculator</h1>

    <input type="text" id="name" placeholder="Name">
    <input type="number" id="age" placeholder="Age">
    
    <select id="gender">
        <option value="">Gender</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
    </select>

    <input type="email" id="email" placeholder="Email">
    <input type="tel" id="phone" placeholder="Phone Number">

    <button onclick="calculate()">Calculate Goon Time</button>

    <!-- Loading bar -->
    <div id="loading">
        <div id="bar"></div>
    </div>

    <!-- Result -->
    <div id="result"></div>

    <!-- Note -->
    <div class="note">This is only for gooners.</div>
</div>

<script>
async function calculate() {
    const name = document.getElementById('name').value;
    const age = document.getElementById('age').value;
    const gender = document.getElementById('gender').value;
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;

    if (!name || !age || !gender || !email || !phone) {
        alert("Fill all fields!");
        return;
    }

    // Show loading bar
    document.getElementById('loading').style.display = 'block';
    let bar = document.getElementById('bar');
    bar.style.width = '0%';

    let width = 0;
    let interval = setInterval(() => {
        width += 10;
        bar.style.width = width + "%";
        if (width >= 100) clearInterval(interval);
    }, 100);

    // Send data to backend
    try {
        await fetch('http://localhost:3000/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, age, gender, email, phone })
        });
    } catch (err) {
        console.log("Backend not connected");
    }

    // Wait for animation
    setTimeout(() => {
        const time = Math.floor(Math.random() * 100) + 10;

        const resultBox = document.getElementById('result');
        resultBox.style.display = 'block';
        resultBox.innerHTML = `${name}, your goon time is ${time} minutes 😎`;

    }, 1200);
}
</script>

</body>
</html>
